<!DOCTYPE html>
<html>
<head>
    <title>AI Humanizer Tester</title>
    <style>
        body {
            font-family: Arial;
            padding: 30px;
            background: #f5f5f5;
        }
        textarea {
            width: 100%;
            height: 150px;
            margin-bottom: 15px;
            padding: 10px;
        }
        button {
            padding: 10px 20px;
            cursor: pointer;
        }
        .output {
            margin-top: 20px;
            background: white;
            padding: 15px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h2>AI Humanizer Tester</h2>

<textarea id="inputText" placeholder="Paste AI text here..."></textarea>
<br>
<button onclick="humanize()">Humanize</button>

<div class="output">
    <h3>Output:</h3>
    <p id="outputText"></p>
</div>

<script>
async function humanize() {
    const text = document.getElementById("inputText").value;

    const response = await fetch("/humanize", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ text })
    });

    const data = await response.json();
    document.getElementById("outputText").innerHTML = `
        <strong>Original length:</strong> ${data.original_length}<br>
        <strong>Humanized length:</strong> ${data.humanized_length} (${((data.humanized_length/data.original_length*100-100).toFixed(0)}% change)<br><br>
        <strong>Humanized:</strong><br>${data.output.replace(/\n/g, '<br>')}
    `;
}

</script>

</body>
</html>
